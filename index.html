<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4a2c7a">
    <title>Ziang的口算练习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { -webkit-text-size-adjust: 100%; }
        body {
            min-height: 100vh; min-height: 100dvh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'SF Pro Display', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(160deg, #1a1a4e 0%, #4a2c7a 40%, #ff6b9d 100%);
            padding: max(0.75rem, env(safe-area-inset-top)) max(0.75rem, env(safe-area-inset-right))
                     max(0.75rem, env(safe-area-inset-bottom)) max(0.75rem, env(safe-area-inset-left));
            overflow-x: hidden; touch-action: manipulation;
        }
        .app { width: 100%; max-width: 480px; position: relative; }
        .hidden { display: none !important; }

        .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .star {
            position: absolute; background: #fff; border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite; animation-delay: var(--delay);
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        .screen {
            position: relative; z-index: 1;
            background: rgba(255,255,255,0.97); border-radius: 28px;
            padding: 1.75rem 1.25rem; box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            text-align: center; display: none; opacity: 0;
            transform: translateY(16px) scale(0.98);
        }
        .screen.active { display: block; animation: screenIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        .screen.leaving { display: block; animation: screenOut 0.3s ease forwards; }
        @keyframes screenIn { to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes screenOut { to { opacity: 0; transform: translateY(-12px) scale(0.98); } }

        .mascot { font-size: 3.5rem; margin-bottom: 0.25rem; animation: wiggle 2s ease-in-out infinite; }
        @keyframes wiggle {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }
        .title {
            font-size: clamp(1.4rem, 5vw, 1.85rem); font-weight: 800; margin-bottom: 0.2rem;
            background: linear-gradient(135deg, #ff6b9d, #c44dff, #4dabf7);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .tagline { color: #888; font-size: 0.95rem; margin-bottom: 1rem; }

        .best-badge {
            display: inline-flex; align-items: center; gap: 0.35rem;
            background: linear-gradient(135deg, #fff9db, #ffe8cc);
            color: #e67700; font-weight: 700; font-size: 0.85rem;
            padding: 0.4rem 0.9rem; border-radius: 999px; margin-bottom: 1rem;
        }

        .section-label {
            font-size: 0.8rem; font-weight: 700; color: #aaa;
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem;
        }
        .difficulty-row, .settings-row {
            display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 1rem;
        }
        .chip {
            flex: 1; max-width: 140px; padding: 0.65rem 0.5rem;
            border: 2px solid #eee; border-radius: 14px; background: #fff;
            font-family: inherit; font-size: 0.9rem; font-weight: 600; color: #666;
            cursor: pointer; transition: all 0.2s;
        }
        .chip.selected {
            border-color: #c44dff; background: #faf5ff; color: #c44dff;
            box-shadow: 0 4px 12px rgba(196,77,255,0.2);
        }
        .chip:active { transform: scale(0.96); }

        .rules {
            background: #fff5f8; border-radius: 16px; padding: 0.85rem 1rem;
            text-align: left; margin-bottom: 1rem; color: #666; font-size: 0.88rem; line-height: 1.7;
        }
        .rules li { margin-left: 1.1rem; }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 0.35rem;
            border: none; cursor: pointer; font-family: inherit;
            font-size: 1rem; font-weight: 700;
            padding: 0.9rem 1.5rem; min-height: 50px; border-radius: 999px;
            transition: transform 0.15s; width: 100%; max-width: 280px;
        }
        .btn:active { transform: scale(0.96); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary {
            background: linear-gradient(135deg, #ff6b9d, #c44dff);
            color: #fff; box-shadow: 0 6px 20px rgba(196,77,255,0.4);
        }
        .btn-secondary { background: #f0f0f5; color: #555; margin-top: 0.6rem; }
        .btn-accent {
            background: linear-gradient(135deg, #ffd43b, #ff922b);
            color: #fff; box-shadow: 0 6px 16px rgba(255,146,43,0.35);
            margin-top: 0.6rem;
        }
        .btn-ghost {
            background: transparent; color: #aaa; font-size: 0.85rem;
            min-height: auto; padding: 0.4rem; width: auto; max-width: none;
        }

        /* 答题页 */
        .quiz-top {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;
        }
        .quiz-header { margin-bottom: 0.75rem; flex: 1; }
        .quiz-meta {
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 0.2rem 0.5rem;
            font-size: 0.85rem; color: #888; margin-bottom: 0.4rem; font-weight: 600;
        }
        .quiz-meta .streak { width: 100%; text-align: right; }
        .quiz-meta .timer {
            font-variant-numeric: tabular-nums;
            color: #4dabf7; font-weight: 700;
            background: #e7f5ff; padding: 0.15rem 0.55rem; border-radius: 8px;
        }
        .streak { color: #ff922b; min-height: 1.1rem; font-size: 0.8rem; }
        .streak.show { animation: popIn 0.4s cubic-bezier(0.22, 1, 0.36, 1); }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        .progress-track { height: 8px; background: #eee; border-radius: 999px; overflow: hidden; }
        .progress-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #ff6b9d, #c44dff, #ffd43b);
            border-radius: 999px; transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .question-box {
            min-height: 110px; display: flex; flex-direction: column; justify-content: center;
            margin-bottom: 0.25rem;
        }
        .question-box.animate-in { animation: qSlideIn 0.35s cubic-bezier(0.22, 1, 0.36, 1); }
        @keyframes qSlideIn {
            from { opacity: 0; transform: translateX(16px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .oral-equation {
            display: flex; align-items: center; justify-content: center; flex-wrap: wrap;
            gap: 0.35rem 0.6rem;
            font-size: clamp(2.4rem, 11vw, 3.4rem); font-weight: 800;
            line-height: 1.2; animation: emojiPop 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .oral-equation .num { color: #333; min-width: 1.2em; text-align: center; }
        .oral-equation .op-add { color: #51cf66; }
        .oral-equation .op-sub { color: #ff922b; }
        .oral-equation .eq { color: #c44dff; }
        .oral-tip {
            font-size: 0.8rem; color: #bbb; margin-top: 0.35rem;
        }
        @keyframes emojiPop {
            0% { transform: scale(0.85); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .answer-display {
            width: 100%; max-width: 180px; height: 60px; margin: 0.5rem auto 0.75rem;
            font-size: 2rem; font-weight: 800; color: #c44dff;
            background: #faf5ff; border: 3px solid #e8d5ff; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .answer-display.empty { color: #ccc; }
        .answer-display.shake { animation: shake 0.45s ease; }
        .answer-display.correct-flash {
            border-color: #51cf66; background: #f4fce8;
            animation: correctPulse 0.5s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
        @keyframes correctPulse { 50% { transform: scale(1.05); } }

        .numpad {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem;
            max-width: 280px; margin: 0 auto 0.75rem;
        }
        .num-key {
            height: 52px; border: none; border-radius: 14px;
            background: #f5f5fa; font-family: inherit;
            font-size: 1.4rem; font-weight: 700; color: #444;
            cursor: pointer; transition: transform 0.1s, background 0.15s;
            box-shadow: 0 2px 0 #ddd;
        }
        .num-key:active { transform: translateY(2px); box-shadow: none; background: #ececf2; }
        .num-key.action { font-size: 1rem; color: #888; background: #eee; }
        .num-key.submit {
            background: linear-gradient(135deg, #ff6b9d, #c44dff);
            color: #fff; font-size: 0.95rem; box-shadow: 0 3px 0 #a855d8;
        }
        .num-key.submit:active { box-shadow: none; }

        .hint { color: #aaa; font-size: 0.8rem; min-height: 1.1rem; }

        .feedback {
            position: fixed; inset: 0; z-index: 200;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; opacity: 0;
        }
        .feedback.show { animation: feedbackIn 0.45s ease forwards; }
        @keyframes feedbackIn {
            0% { opacity: 0; } 12% { opacity: 1; } 78% { opacity: 1; } 100% { opacity: 0; }
        }
        .feedback-bubble {
            background: #fff; border-radius: 24px; padding: 1.25rem 2rem;
            box-shadow: 0 16px 48px rgba(0,0,0,0.2);
            animation: bubblePop 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes bubblePop {
            0% { transform: scale(0.5); } 50% { transform: scale(1.08); } 100% { transform: scale(1); }
        }
        .feedback-emoji { font-size: 2.75rem; }
        .feedback-text { font-size: 1.1rem; font-weight: 700; margin-top: 0.2rem; }
        .feedback.correct .feedback-text { color: #51cf66; }
        .feedback.wrong .feedback-text { color: #ff922b; }

        /* 结果页 */
        .grade-summary {
            display: flex; align-items: center; justify-content: center; gap: 1.25rem;
            margin-bottom: 0.75rem; animation: scoreBounce 0.7s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .grade-item { text-align: center; }
        .grade-val {
            display: block; font-size: 2.25rem; font-weight: 800; line-height: 1.1;
        }
        .grade-item.score .grade-val { color: #ff922b; }
        .grade-item.time .grade-val { color: #4dabf7; font-variant-numeric: tabular-nums; }
        .grade-lbl { font-size: 0.85rem; color: #888; font-weight: 600; }
        .grade-divider { width: 1px; height: 48px; background: #eee; }

        @keyframes scoreBounce {
            0% { transform: scale(0); } 60% { transform: scale(1.12); } 100% { transform: scale(1); }
        }

        .star-row { font-size: 1.75rem; margin-bottom: 0.5rem; letter-spacing: 4px; }
        .star-row .dim { opacity: 0.25; }

        .new-record {
            display: inline-block; background: #ff6b9d; color: #fff;
            font-size: 0.8rem; font-weight: 700; padding: 0.25rem 0.75rem;
            border-radius: 999px; margin-bottom: 0.5rem;
            animation: popIn 0.5s ease;
        }
        .encourage-emoji { font-size: 2.25rem; animation: emojiPop 0.6s ease 0.3s both; }
        .encourage-text {
            font-size: 1rem; color: #555; line-height: 1.55; margin-bottom: 1rem;
            animation: screenIn 0.5s ease 0.4s both;
        }
        .details {
            text-align: left; max-height: min(32vh, 220px); overflow-y: auto;
            border-radius: 14px; background: #f8f8fc; padding: 0.6rem;
            margin-bottom: 1rem; -webkit-overflow-scrolling: touch;
        }
        .detail-item {
            display: flex; align-items: flex-start; gap: 0.4rem;
            padding: 0.55rem 0.4rem; border-bottom: 1px solid #eee;
            font-size: 0.85rem; color: #444;
            opacity: 0; animation: detailIn 0.35s ease forwards;
        }
        @keyframes detailIn { to { opacity: 1; transform: translateX(0); } }
        .detail-item { transform: translateX(-8px); }
        .detail-item:last-child { border-bottom: none; }
        .detail-num { font-weight: 700; color: #c44dff; min-width: 1.3rem; }
        .detail-q { flex: 1; line-height: 1.45; }
        .detail-ans { font-size: 0.78rem; color: #888; margin-top: 2px; }
        .detail-mark { font-size: 1.1rem; flex-shrink: 0; }
        .detail-mark.correct { color: #51cf66; }
        .detail-mark.wrong { color: #ff6b6b; }

        .btn-group { display: flex; flex-direction: column; align-items: center; }
        .footer-note { margin-top: 0.75rem; font-size: 0.75rem; color: rgba(255,255,255,0.55); text-align: center; line-height: 1.6; }
        .footer-note .version { opacity: 0.75; font-variant-numeric: tabular-nums; }
        #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 300; }

        @media (max-width: 480px) {
            .screen { padding: 1.5rem 1rem; }
            .num-key { height: 48px; font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="stars" id="stars"></div>

        <div class="screen active" id="welcome">
            <div class="mascot">⚡</div>
            <h1 class="title">Ziang的口算练习</h1>
            <p class="tagline">心算加减，越练越快！</p>
            <div class="best-badge" id="bestBadge">🏆 最佳：--</div>
            <div class="best-badge" id="practiceBadge" style="background:linear-gradient(135deg,#f0f9ff,#e7f5ff);color:#1971c2;margin-top:-0.5rem;">📊 已练 0 组</div>

            <p class="section-label">口算范围</p>
            <div class="difficulty-row">
                <button class="chip selected" data-level="20">二十以内</button>
                <button class="chip" data-level="100">一百以内</button>
            </div>

            <p class="section-label">题型</p>
            <div class="difficulty-row">
                <button class="chip selected" data-mode="mix">加减混合</button>
                <button class="chip" data-mode="add">加法</button>
                <button class="chip" data-mode="sub">减法</button>
            </div>

            <p class="section-label">设置</p>
            <div class="settings-row">
                <button class="chip" id="soundToggle">🔊 音效开</button>
            </div>

            <ul class="rules">
                <li>每组 <strong>10</strong> 道口算，自动计时</li>
                <li>成绩 = 分数 + 用时，越高越快越好</li>
            </ul>
            <button class="btn btn-primary" id="startBtn">开始口算 ⚡</button>
        </div>

        <div class="screen" id="quiz">
            <div class="quiz-top">
                <div class="quiz-header">
                    <div class="quiz-meta">
                        <span id="quizProgress">口算 1 / 10</span>
                        <span class="timer" id="quizTimer">0:00</span>
                        <span class="streak" id="streak"></span>
                    </div>
                    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
                </div>
                <button class="btn btn-ghost" id="quitBtn">退出</button>
            </div>
            <div class="question-box animate-in" id="questionBox">
                <div class="oral-equation" id="oralEquation"></div>
                <p class="oral-tip">心算后填答案</p>
            </div>
            <div class="answer-display empty" id="answerDisplay">?</div>
            <div class="numpad" id="numpad">
                <button class="num-key" data-key="1">1</button>
                <button class="num-key" data-key="2">2</button>
                <button class="num-key" data-key="3">3</button>
                <button class="num-key" data-key="4">4</button>
                <button class="num-key" data-key="5">5</button>
                <button class="num-key" data-key="6">6</button>
                <button class="num-key" data-key="7">7</button>
                <button class="num-key" data-key="8">8</button>
                <button class="num-key" data-key="9">9</button>
                <button class="num-key action" data-key="del">⌫</button>
                <button class="num-key" data-key="0">0</button>
                <button class="num-key submit" data-key="go" id="numpadGo">下一题</button>
            </div>
            <p class="hint" id="hintText">心算出来再点数字～</p>
        </div>

        <div class="screen" id="result">
            <p class="section-label" style="margin-bottom:0.75rem;">本次成绩</p>
            <div class="grade-summary">
                <div class="grade-item score">
                    <span class="grade-val" id="scoreNum">0</span>
                    <span class="grade-lbl">分</span>
                </div>
                <div class="grade-divider"></div>
                <div class="grade-item time">
                    <span class="grade-val" id="timeNum">0</span>
                    <span class="grade-lbl">用时</span>
                </div>
            </div>
            <div class="star-row" id="starRow"></div>
            <div class="new-record hidden" id="newRecord">🎉 新纪录！</div>
            <div class="encourage-emoji" id="encourageEmoji"></div>
            <p class="encourage-text" id="encourageText"></p>
            <div class="details" id="detailsList"></div>
            <div class="btn-group">
                <button class="btn btn-primary" id="retryBtn">再练一组 🔄</button>
                <button class="btn btn-accent hidden" id="wrongBtn">错题重练 💪</button>
                <button class="btn btn-secondary" id="homeBtn">返回首页</button>
            </div>
        </div>

        <p class="footer-note">Made with ❤️ for Ziang<br><span class="version" id="version">版本加载中…</span></p>
    </div>

    <div class="feedback" id="feedback">
        <div class="feedback-bubble">
            <div class="feedback-emoji" id="feedbackEmoji"></div>
            <div class="feedback-text" id="feedbackText"></div>
        </div>
    </div>
    <canvas id="confetti"></canvas>

    <script>
        const TOTAL = 10;
        const POINTS = 10;
        const STORAGE_KEY = 'ziang-quiz';

        const HINTS = ['心算一下～🧠', '不用笔，靠脑子！💪', '算出来再填 ✨', '口算高手就是你 ⚡'];
        const CORRECT_MSGS = ['对了！⚡', '口算正确！', '很快哦！👏', '继续！'];
        const WRONG_MSGS = ['没关系～', '下一题！', '再练就好 💪'];

        let questions = [], current = 0, streak = 0, switching = false;
        let quizTotal = TOTAL, answerStr = '';
        let maxNum = 20, quizMode = 'mix', soundOn = true, isReview = false;
        let timerStart = 0, timerInterval = null, elapsedMs = 0;
        let pausedMs = 0, pauseStart = 0, visibilityPauseStart = 0;
        let audioCtx = null;

        function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
        function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        function getElapsedMs() {
            if (!timerStart) return elapsedMs;
            const activePause = pauseStart ? Date.now() - pauseStart : 0;
            const visPause = visibilityPauseStart ? Date.now() - visibilityPauseStart : 0;
            return Math.max(0, Date.now() - timerStart - pausedMs - activePause - visPause);
        }

        function formatTime(ms) {
            const totalSec = Math.floor(ms / 1000);
            const min = Math.floor(totalSec / 60);
            const sec = totalSec % 60;
            return min > 0 ? `${min}:${sec.toString().padStart(2, '0')}` : `0:${sec.toString().padStart(2, '0')}`;
        }

        function formatTimeLabel(ms) {
            const totalSec = Math.floor(ms / 1000);
            const min = Math.floor(totalSec / 60);
            const sec = totalSec % 60;
            return min > 0 ? `${min}分${sec}秒` : `${sec}秒`;
        }

        function startTimer() {
            stopTimer();
            timerStart = Date.now();
            elapsedMs = 0;
            pausedMs = 0;
            pauseStart = 0;
            visibilityPauseStart = 0;
            updateTimerDisplay();
            timerInterval = setInterval(updateTimerDisplay, 200);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            if (timerStart) {
                elapsedMs = getElapsedMs();
                timerStart = 0;
                pauseStart = 0;
                visibilityPauseStart = 0;
            }
            updateTimerDisplay();
        }

        function pauseTimer() {
            if (!timerStart || pauseStart) return;
            pauseStart = Date.now();
        }

        function resumeTimer() {
            if (!pauseStart) return;
            pausedMs += Date.now() - pauseStart;
            pauseStart = 0;
        }

        function updateTimerDisplay() {
            const ms = timerStart ? getElapsedMs() : elapsedMs;
            const el = document.getElementById('quizTimer');
            if (el) el.textContent = formatTime(ms);
        }

        function getRecordKey() {
            return `record${maxNum}_${quizMode}`;
        }

        function migrateStorage(data) {
            let changed = false;
            if (data.best20 && !data.record20_mix) {
                data.record20_mix = { score: data.best20, timeMs: 999999999 };
                changed = true;
            }
            if (data.best100 && !data.record100_mix) {
                data.record100_mix = { score: data.best100, timeMs: 999999999 };
                changed = true;
            }
            if (changed) localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            return data;
        }

        function loadSettings() {
            try {
                let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
                data = migrateStorage(data);
                soundOn = data.soundOn !== false;
                maxNum = data.level || 20;
                quizMode = data.mode || 'mix';
            } catch { /* ignore */ }
            document.querySelectorAll('[data-level]').forEach(el => {
                el.classList.toggle('selected', +el.dataset.level === maxNum);
            });
            document.querySelectorAll('[data-mode]').forEach(el => {
                el.classList.toggle('selected', el.dataset.mode === quizMode);
            });
            updateSoundBtn();
            updateBestBadge();
            updatePracticeBadge();
        }

        function saveSettings() {
            const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            data.soundOn = soundOn;
            data.level = maxNum;
            data.mode = quizMode;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function updatePracticeBadge() {
            const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            const count = data.practiceCount || 0;
            document.getElementById('practiceBadge').textContent =
                count > 0 ? `📊 已练 ${count} 组口算` : '📊 开始第一组口算吧！';
        }

        function incrementPracticeCount() {
            const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            data.practiceCount = (data.practiceCount || 0) + 1;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            updatePracticeBadge();
        }

        function getBestRecord() {
            const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            return data[getRecordKey()] || null;
        }

        function isBetterRecord(score, timeMs, old) {
            if (!old) return score > 0;
            if (score > old.score) return true;
            return score === old.score && timeMs < old.timeMs;
        }

        function setBestRecord(score, timeMs) {
            const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            const key = getRecordKey();
            const old = data[key];
            if (isBetterRecord(score, timeMs, old)) {
                data[key] = { score, timeMs };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                return true;
            }
            return false;
        }

        function updateBestBadge() {
            const best = getBestRecord();
            document.getElementById('bestBadge').textContent = best
                ? `🏆 最佳：${best.score}分 · ${formatTimeLabel(best.timeMs)}`
                : '🏆 快来创造第一个纪录吧！';
        }

        function updateSoundBtn() {
            document.getElementById('soundToggle').textContent = soundOn ? '🔊 音效开' : '🔇 音效关';
            document.getElementById('soundToggle').classList.toggle('selected', soundOn);
        }

        function getAudioContext() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }

        function playTone(type) {
            if (!soundOn) return;
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                if (type === 'correct') {
                    osc.frequency.setValueAtTime(523, ctx.currentTime);
                    osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
                } else if (type === 'wrong') {
                    osc.frequency.setValueAtTime(330, ctx.currentTime);
                } else {
                    osc.frequency.setValueAtTime(440, ctx.currentTime);
                }
                gain.gain.setValueAtTime(0.15, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.2);
            } catch { /* ignore */ }
        }

        function generateQuestions() {
            const list = [], used = new Set();
            const cap = maxNum;
            let attempts = 0;
            const maxAttempts = quizTotal * 100;

            while (list.length < quizTotal && attempts < maxAttempts) {
                attempts++;
                let isAdd;
                if (quizMode === 'add') isAdd = true;
                else if (quizMode === 'sub') isAdd = false;
                else isAdd = Math.random() < 0.5;

                let a, b, answer, expr;
                if (isAdd) {
                    a = rand(1, cap - 1);
                    b = rand(1, cap - a);
                    answer = a + b;
                    expr = `${a} + ${b}`;
                } else {
                    a = rand(1, cap);
                    b = rand(1, a);
                    answer = a - b;
                    expr = `${a} - ${b}`;
                }
                if (used.has(expr)) continue;
                used.add(expr);
                list.push({ a, b, isAdd, expr, answer, userAnswer: null });
            }

            while (list.length < quizTotal) {
                let isAdd = quizMode === 'sub' ? false : (quizMode === 'add' || Math.random() < 0.5);
                let a, b, answer, expr;
                if (isAdd) {
                    a = rand(1, cap - 1);
                    b = rand(1, cap - a);
                    answer = a + b;
                    expr = `${a} + ${b}`;
                } else {
                    a = rand(1, cap);
                    b = rand(1, a);
                    answer = a - b;
                    expr = `${a} - ${b}`;
                }
                list.push({ a, b, isAdd, expr, answer, userAnswer: null });
            }
            return list;
        }

        function getEncouragement(score, timeMs) {
            const pct = score / (quizTotal * POINTS) * 100;
            const fast = timeMs <= quizTotal * 5000;
            if (pct === 100 && fast) return { emoji: '🌟', text: `全对！${formatTimeLabel(timeMs)} 完成，又快又准！` };
            if (pct === 100) return { emoji: '🌟', text: `全对口算！用时 ${formatTimeLabel(timeMs)}，太棒了！` };
            if (pct >= 90) return { emoji: '👏', text: `口算很棒！${score} 分，用时 ${formatTimeLabel(timeMs)}` };
            if (pct >= 80) return { emoji: '😊', text: `大部分对了！${score} 分 · ${formatTimeLabel(timeMs)}` };
            if (pct >= 60) return { emoji: '💪', text: '有进步！多练几组，速度和准确率都会提高！' };
            if (pct >= 40) return { emoji: '🌱', text: '口算需要多练，别放弃，再来一组！' };
            return { emoji: '✨', text: '每组练习都有收获，再试一组吧！' };
        }

        function getStars(score) {
            const pct = score / (quizTotal * POINTS);
            if (pct === 1) return 5;
            if (pct >= 0.8) return 4;
            if (pct >= 0.6) return 3;
            if (pct >= 0.4) return 2;
            return 1;
        }

        function switchScreen(id) {
            return new Promise(resolve => {
                const target = document.getElementById(id);
                const currentEl = document.querySelector('.screen.active');
                if (currentEl === target) { resolve(); return; }
                if (currentEl) {
                    currentEl.classList.add('leaving');
                    currentEl.classList.remove('active');
                    setTimeout(() => {
                        currentEl.classList.remove('leaving');
                        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                        target.classList.add('active');
                        resolve();
                    }, 280);
                } else {
                    target.classList.add('active');
                    resolve();
                }
            });
        }

        function updateProgress() {
            document.getElementById('quizProgress').textContent =
                `口算 ${current + 1} / ${quizTotal}` + (isReview ? '（错题）' : '');
            document.getElementById('progressFill').style.width = `${(current / quizTotal) * 100}%`;
            const streakEl = document.getElementById('streak');
            if (streak >= 2) {
                streakEl.textContent = `🔥 连对 ${streak} 题！`;
                streakEl.classList.add('show');
            } else {
                streakEl.textContent = '';
                streakEl.classList.remove('show');
            }
            document.getElementById('numpadGo').textContent =
                current === quizTotal - 1 ? '交卷 📝' : '下一题 ➡️';
        }

        function updateAnswerDisplay() {
            const el = document.getElementById('answerDisplay');
            if (answerStr === '') {
                el.textContent = '?';
                el.classList.add('empty');
            } else {
                el.textContent = answerStr;
                el.classList.remove('empty');
            }
        }

        function renderQuestion() {
            const q = questions[current];
            const box = document.getElementById('questionBox');
            box.classList.remove('animate-in');
            void box.offsetWidth;
            box.classList.add('animate-in');

            const opClass = q.isAdd ? 'op-add' : 'op-sub';
            const opSym = q.isAdd ? '+' : '−';
            document.getElementById('oralEquation').innerHTML =
                `<span class="num">${q.a}</span>` +
                `<span class="${opClass}">${opSym}</span>` +
                `<span class="num">${q.b}</span>` +
                `<span class="eq">= ?</span>`;

            answerStr = '';
            const display = document.getElementById('answerDisplay');
            display.classList.remove('shake', 'correct-flash');
            updateAnswerDisplay();

            document.getElementById('hintText').textContent = pick(HINTS);
            updateProgress();
        }

        function numpadInput(key) {
            if (switching) return;
            if (key === 'del') {
                answerStr = answerStr.slice(0, -1);
            } else if (key === 'go') {
                submitAnswer();
                return;
            } else {
                if (answerStr.length >= 3) return;
                answerStr += key;
            }
            updateAnswerDisplay();
        }

        function vibrate(type) {
            if (navigator.vibrate) navigator.vibrate(type === 'correct' ? [30] : [20, 40, 20]);
        }

        async function showFeedback(isCorrect) {
            pauseTimer();
            const fb = document.getElementById('feedback');
            fb.className = 'feedback show ' + (isCorrect ? 'correct' : 'wrong');
            document.getElementById('feedbackEmoji').textContent = isCorrect ? '🎉' : '🌈';
            document.getElementById('feedbackText').textContent = pick(isCorrect ? CORRECT_MSGS : WRONG_MSGS);
            playTone(isCorrect ? 'correct' : 'wrong');
            vibrate(isCorrect ? 'correct' : 'wrong');
            await new Promise(r => setTimeout(r, 450));
            resumeTimer();
        }

        async function startQuiz(reviewWrong = false, countPractice = false) {
            isReview = reviewWrong;
            if (reviewWrong) {
                const wrong = questions.filter(q => q.userAnswer !== q.answer);
                if (!wrong.length) return;
                questions = wrong.map(q => ({ ...q, userAnswer: null }));
                quizTotal = questions.length;
            } else {
                quizTotal = TOTAL;
                questions = generateQuestions();
                if (countPractice) incrementPracticeCount();
            }
            current = 0;
            streak = 0;
            await switchScreen('quiz');
            startTimer();
            renderQuestion();
        }

        async function submitAnswer() {
            if (switching) return;
            const display = document.getElementById('answerDisplay');

            if (answerStr === '') {
                display.classList.remove('shake');
                void display.offsetWidth;
                display.classList.add('shake');
                document.getElementById('hintText').textContent = '先点数字再提交哦～';
                return;
            }

            switching = true;
            const userAns = parseInt(answerStr, 10);
            const isCorrect = userAns === questions[current].answer;
            questions[current].userAnswer = userAns;

            if (isCorrect) {
                streak++;
                display.classList.add('correct-flash');
            } else {
                streak = 0;
            }

            await showFeedback(isCorrect);

            if (current < quizTotal - 1) {
                current++;
                renderQuestion();
            } else {
                document.getElementById('progressFill').style.width = '100%';
                await showResult();
            }
            switching = false;
        }

        function animateScore(target) {
            const el = document.getElementById('scoreNum');
            const duration = 900;
            const start = performance.now();
            function tick(now) {
                const p = Math.min((now - start) / duration, 1);
                el.textContent = Math.round(target * (1 - Math.pow(1 - p, 3)));
                if (p < 1) requestAnimationFrame(tick);
            }
            requestAnimationFrame(tick);
        }

        function renderStars(count) {
            let html = '';
            for (let i = 1; i <= 5; i++) {
                html += i <= count ? '⭐' : '<span class="dim">⭐</span>';
            }
            document.getElementById('starRow').innerHTML = html;
        }

        function launchConfetti() {
            const canvas = document.getElementById('confetti');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const colors = ['#ff6b9d', '#c44dff', '#ffd43b', '#51cf66', '#4dabf7'];
            const pieces = Array.from({ length: 70 }, () => ({
                x: Math.random() * canvas.width,
                y: -20 - Math.random() * canvas.height,
                r: Math.random() * 6 + 4,
                color: colors[Math.floor(Math.random() * colors.length)],
                speed: Math.random() * 3 + 2,
                drift: Math.random() * 2 - 1,
                rot: Math.random() * 360,
            }));
            let frame = 0;
            (function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                pieces.forEach(p => {
                    p.y += p.speed; p.x += p.drift; p.rot += 4;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rot * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.6);
                    ctx.restore();
                });
                if (++frame < 110) requestAnimationFrame(draw);
                else ctx.clearRect(0, 0, canvas.width, canvas.height);
            })();
        }

        async function showResult() {
            stopTimer();

            let score = 0;
            questions.forEach(q => {
                q.correct = q.userAnswer === q.answer;
                if (q.correct) score += POINTS;
            });

            const enc = getEncouragement(score, elapsedMs);
            const isNewBest = !isReview && setBestRecord(score, elapsedMs);
            const wrongCount = questions.filter(q => !q.correct).length;

            await switchScreen('result');
            animateScore(score);
            document.getElementById('timeNum').textContent = formatTimeLabel(elapsedMs);
            renderStars(getStars(score));
            document.getElementById('newRecord').classList.toggle('hidden', !isNewBest);
            document.getElementById('encourageEmoji').textContent = enc.emoji;
            document.getElementById('encourageText').textContent = enc.text;

            document.getElementById('wrongBtn').classList.toggle('hidden', wrongCount === 0);
            updateBestBadge();

            if (isReview) {
                document.getElementById('newRecord').classList.add('hidden');
            }

            document.getElementById('detailsList').innerHTML = questions.map((q, i) => {
                const mark = q.correct
                    ? '<span class="detail-mark correct">✓</span>'
                    : '<span class="detail-mark wrong">✗</span>';
                const ansLine = q.correct
                    ? `你的答案：${q.userAnswer}`
                    : `你的答案：${q.userAnswer} · 正确答案：${q.answer}`;
                return `<div class="detail-item" style="animation-delay:${i * 0.05}s">
                    <span class="detail-num">${i + 1}</span>
                    <div><div class="detail-q">${q.expr} = ${q.answer}</div>
                    <div class="detail-ans">${ansLine}</div></div>${mark}</div>`;
            }).join('');

            if (score >= quizTotal * POINTS * 0.8) launchConfetti();
            if (isNewBest) playTone('start');
        }

        document.querySelectorAll('[data-level]').forEach(btn => {
            btn.addEventListener('click', () => {
                maxNum = +btn.dataset.level;
                document.querySelectorAll('[data-level]').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                saveSettings();
                updateBestBadge();
            });
        });

        document.querySelectorAll('[data-mode]').forEach(btn => {
            btn.addEventListener('click', () => {
                quizMode = btn.dataset.mode;
                document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                saveSettings();
                updateBestBadge();
            });
        });

        document.getElementById('soundToggle').addEventListener('click', () => {
            soundOn = !soundOn;
            saveSettings();
            updateSoundBtn();
            if (soundOn) playTone('start');
        });

        document.getElementById('numpad').addEventListener('click', e => {
            const key = e.target.closest('.num-key')?.dataset.key;
            if (key) numpadInput(key);
        });

        document.getElementById('startBtn').addEventListener('click', () => {
            playTone('start');
            startQuiz(false, true);
        });
        document.getElementById('retryBtn').addEventListener('click', () => startQuiz(false, false));
        document.getElementById('wrongBtn').addEventListener('click', () => startQuiz(true));
        document.getElementById('homeBtn').addEventListener('click', () => switchScreen('welcome'));
        document.getElementById('quitBtn').addEventListener('click', () => {
            if (confirm('确定要退出吗？本次进度不会保存哦～')) {
                stopTimer();
                switchScreen('welcome');
            }
        });

        document.addEventListener('keydown', e => {
            if (!document.getElementById('quiz').classList.contains('active')) return;
            if (e.key >= '0' && e.key <= '9') numpadInput(e.key);
            else if (e.key === 'Backspace') numpadInput('del');
            else if (e.key === 'Enter') numpadInput('go');
        });

        document.addEventListener('visibilitychange', () => {
            const inQuiz = document.getElementById('quiz').classList.contains('active');
            if (!inQuiz || !timerStart) return;
            if (document.hidden) {
                if (!pauseStart) visibilityPauseStart = Date.now();
            } else if (visibilityPauseStart) {
                pausedMs += Date.now() - visibilityPauseStart;
                visibilityPauseStart = 0;
            }
        });

        function formatVersionDate(date) {
            const parts = new Intl.DateTimeFormat('zh-CN', {
                timeZone: 'Asia/Shanghai',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false,
            }).formatToParts(date);
            const get = type => parts.find(p => p.type === type)?.value || '';
            return `${get('year')}-${get('month')}-${get('day')} ${get('hour')}:${get('minute')}:${get('second')}`;
        }

        async function loadVersion() {
            const el = document.getElementById('version');
            try {
                const res = await fetch('https://api.github.com/repos/xfstl/xfstl.github.io/commits/main');
                if (!res.ok) throw new Error('fetch failed');
                const data = await res.json();
                const date = new Date(data.commit.committer.date);
                el.textContent = `版本 ${formatVersionDate(date)}`;
            } catch {
                el.textContent = '版本 —';
            }
        }

        loadSettings();
        loadVersion();

        const starsEl = document.getElementById('stars');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 1;
            star.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;
                --dur:${Math.random()*3+2}s;--delay:${Math.random()*3}s;`;
            starsEl.appendChild(star);
        }
    </script>
</body>
