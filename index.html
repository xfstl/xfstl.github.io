<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            font-family: 'SF Pro Display', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            overflow: hidden;
        }
        /* 背景星星 */
        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.8); }
        }
        /* 主卡片 */
        .card {
            position: relative; z-index: 1;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px; padding: 4rem 5rem;
            text-align: center;
            animation: float 6s ease-in-out infinite;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .wave { font-size: 3rem; margin-bottom: 0.5rem; animation: bounce 1.5s ease-in-out infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        h1 {
            font-size: 4rem; font-weight: 800; margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 40%, #fda085 70%, #ffe29f 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-size: 300% 300%;
            animation: gradient 4s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .subtitle {
            font-size: 1.3rem; color: rgba(255,255,255,0.6);
            letter-spacing: 3px; margin-bottom: 2rem;
        }
        .divider {
            width: 60px; height: 3px;
            background: linear-gradient(90deg, #f093fb, #f5576c);
            margin: 0 auto 2rem; border-radius: 2px;
        }
        .info {
            color: rgba(255,255,255,0.5); font-size: 0.95rem;
            line-height: 2; letter-spacing: 1px;
        }
        .info span { color: #fda085; font-weight: 600; }
        .glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; height: 300px; border-radius: 50%;
            background: radial-gradient(circle, rgba(240,147,251,0.15) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }
    </style>
</head>
<body>
    <!-- 星星背景 -->
    <div class="stars" id="stars"></div>

    <!-- 光晕 -->
    <div class="glow"></div>

    <!-- 卡片 -->
    <div class="card">
        <div class="wave">👋</div>
        <h1>Hello World</h1>
        <p class="subtitle">· 你好，世界 ·</p>
        <div class="divider"></div>
        <p class="info">
            Deployed by <span>Wyatt Biao</span> · <span>Ziang</span> · <span>Ziyan</span> · <span>Yueping</span><br>
            via GitHub Pages 🚀
        </p>
    </div>

    <script>
        // 生成星星
        const stars = document.getElementById('stars');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 1;
            star.style.cssText = `
                width: ${size}px; height: ${size}px;
                top: ${Math.random() * 100}%;
                left: ${Math.random() * 100}%;
                --dur: ${Math.random() * 3 + 2}s;
                --delay: ${Math.random() * 3}s;
            `;
            stars.appendChild(star);
        }
    </script>
</body>
</html>
